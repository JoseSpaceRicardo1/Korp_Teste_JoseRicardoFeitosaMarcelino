<div class="container" style="padding: 24px; max-width: 800px; margin: 0 auto;">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Emitir Nova Nota Fiscal</mat-card-title>
      <mat-card-subtitle>Adicione um ou mais produtos à nota</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content style="padding-top: 16px;">

      <div *ngFor="let item of itens; let i = index"
        style="display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;">

        <mat-form-field appearance="outline" style="flex: 2; min-width: 200px;">
          <mat-label>Produto</mat-label>
          <mat-select [(ngModel)]="item.produtoId" [name]="'produto' + i">
            <mat-option [value]="null" disabled>Selecione...</mat-option>
            <mat-option *ngFor="let p of produtos" [value]="p.codigo">
              {{ p.descricao }} — saldo: {{ p.saldo }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 1; min-width: 110px;">
          <mat-label>Quantidade</mat-label>
          <input matInput type="number" min="1"
            [(ngModel)]="item.quantidade"
            [name]="'qtd' + i">
          <mat-hint *ngIf="saldoProduto(item.produtoId) !== null"
            [style.color]="item.quantidade > (saldoProduto(item.produtoId) ?? 0) ? '#e53935' : '#43a047'">
            Disponível: {{ saldoProduto(item.produtoId) }}
          </mat-hint>
        </mat-form-field>

        <button mat-icon-button color="warn"
          *ngIf="itens.length > 1"
          (click)="removerItem(i)"
          title="Remover produto">
          <mat-icon>remove_circle_outline</mat-icon>
        </button>
      </div>

      <mat-divider style="margin: 16px 0;"></mat-divider>

      <button mat-stroked-button color="accent" (click)="adicionarItem()" style="margin-bottom: 8px;">
        <mat-icon>add</mat-icon>
        Adicionar Produto
      </button>

    </mat-card-content>

    <mat-card-actions style="padding: 16px;">
      <button mat-raised-button color="primary"
        (click)="salvar()"
        [disabled]="salvando">
        {{ salvando ? 'Emitindo...' : 'Emitir Nota Fiscal' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
