<div class="container" style="padding: 24px; max-width: 900px; margin: 0 auto;">

  <mat-card style="margin-bottom: 32px;">
    <mat-card-header>
      <mat-card-title>Cadastrar Produto</mat-card-title>
    </mat-card-header>
    <mat-card-content style="padding-top: 16px;">
      <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;">

        <mat-form-field appearance="outline" style="flex: 1; min-width: 200px;">
          <mat-label>Descrição</mat-label>
          <input matInput
            [(ngModel)]="novoProduto.descricao"
            name="descricao"
            placeholder="Nome do produto">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Saldo Inicial</mat-label>
          <input matInput type="number" min="0"
            [(ngModel)]="novoProduto.saldo"
            name="saldo"
            placeholder="0">
        </mat-form-field>

        <button mat-raised-button color="primary"
          (click)="salvar()"
          [disabled]="salvando">
          {{ salvando ? 'Salvando...' : 'Cadastrar' }}
        </button>

      </div>
    </mat-card-content>
  </mat-card>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
    <h2 style="margin: 0;">Produtos Cadastrados</h2>
    <button mat-stroked-button (click)="listarProdutos()" [disabled]="carregando"> Atualizar
    </button>
  </div>

  <div *ngIf="carregando" style="text-align:center; padding: 32px; color: gray;">
    Carregando produtos...
  </div>

  <table mat-table [dataSource]="produtos" class="mat-elevation-z4"
    *ngIf="!carregando" style="width: 100%;">

    <ng-container matColumnDef="codigo">
      <th mat-header-cell *matHeaderCellDef> Código </th>
      <td mat-cell *matCellDef="let p"> {{ p.codigo }} </td>
    </ng-container>

    <ng-container matColumnDef="descricao">
      <th mat-header-cell *matHeaderCellDef> Descrição </th>
      <td mat-cell *matCellDef="let p"> {{ p.descricao }} </td>
    </ng-container>

    <ng-container matColumnDef="saldo">
      <th mat-header-cell *matHeaderCellDef> Saldo </th>
      <td mat-cell *matCellDef="let p">
        <span [style.color]="p.saldo === 0 ? '#e53935' : 'inherit'"
              [style.fontWeight]="p.saldo === 0 ? '600' : 'normal'">
          {{ p.saldo }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button color="warn"
          (click)="deletar(p.codigo)"
          title="Excluir produto">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>

  <div *ngIf="!carregando && produtos.length === 0"
    style="margin-top: 20px; color: gray; text-align: center;">
    Nenhum produto cadastrado ainda.
  </div>

</div>
