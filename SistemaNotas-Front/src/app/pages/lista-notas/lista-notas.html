<div class="container" style="padding: 24px; max-width: 960px; margin: 0 auto;">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h2 style="margin: 0;">Notas Fiscais</h2>
    <button mat-stroked-button (click)="carregarNotas()" [disabled]="carregando">
      Atualizar
    </button>
  </div>

  <div *ngIf="carregando" style="text-align: center; padding: 32px; color: gray;">
    Carregando notas...
  </div>

  <table mat-table [dataSource]="notas" class="mat-elevation-z4"
    *ngIf="!carregando" style="width: 100%;">

    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef> Nº Nota </th>
      <td mat-cell *matCellDef="let nota"> {{ nota.numero }} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let nota">
        <span [style.background]="nota.status === StatusNota.Aberta ? '#43a047' : '#9e9e9e'"
          style="color: white; padding: 3px 10px; border-radius: 12px; font-size: 13px; white-space: nowrap;">
          {{ nota.status === StatusNota.Aberta ? 'Aberta' : 'Fechada' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="itens">
      <th mat-header-cell *matHeaderCellDef> Produtos </th>
      <td mat-cell *matCellDef="let nota" style="font-size: 13px; color: #555;">
        <span *ngIf="nota.itens && nota.itens.length > 0">
          <span *ngFor="let item of nota.itens; let last = last">
            Prod. {{ item.produtoId }} ({{ item.quantidade }} un.){{ !last ? ', ' : '' }}
          </span>
        </span>
        <span *ngIf="!nota.itens || nota.itens.length === 0" style="color: #bbb;">—</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let nota">
        <button mat-raised-button color="primary"
          [disabled]="nota.status !== StatusNota.Aberta || carregandoId === nota.numero"
          (click)="imprimir(nota)"
          [title]="nota.status !== StatusNota.Aberta ? 'Nota já fechada' : 'Imprimir nota e atualizar estoque'">

          <mat-spinner diameter="18"
            *ngIf="carregandoId === nota.numero"
            style="display:inline-block; margin-right: 6px; vertical-align: middle;">
          </mat-spinner>
          <mat-icon *ngIf="carregandoId !== nota.numero">print</mat-icon>
          {{ carregandoId === nota.numero ? 'Processando...' : 'Imprimir' }}
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>

  <div *ngIf="!carregando && notas.length === 0"
    style="margin-top: 24px; color: gray; text-align: center;">
    Nenhuma nota encontrada. Acesse "Emitir Nota" para criar uma.
  </div>

</div>
